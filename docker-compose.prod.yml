# AitoTech marketing website — production (E2E Networks / any Docker host)
#
#   cp .env.production.example .env
#   nano .env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBSITE_HTTP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000',(r)=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
